name: Daily CyberSecNews

on:
  schedule:
    # 06:00 UTC every day. Adjust as desired (cron is in UTC).
    - cron: "0 6 * * *"
  workflow_dispatch:      # allow manual runs from the Actions tab
    inputs:
      since_hours:
        description: "Look-back window in hours (blank = default 24h). Use 720 for a ~30-day initial backfill."
        required: false
        default: ""

# Needed so the job can commit the updated dedup DB back to the repo.
permissions:
  contents: write

concurrency:
  # Never run two aggregations at once (they'd race on the DB commit).
  group: cybersecnews-daily
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}   # optional; empty if unset
          # Passed via env (not inline) to avoid shell-injection from the input.
          SINCE_HOURS: ${{ github.event.inputs.since_hours }}
        run: |
          if [ -n "$SINCE_HOURS" ]; then
            python -m cybersecnews --verbose --since "$SINCE_HOURS"
          else
            python -m cybersecnews --verbose
          fi

      - name: Commit updated dedup DB
        run: |
          git config user.name "cybersecnews-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/seen.db)" ]; then
            git add data/seen.db
            git commit -m "chore: update seen vulnerabilities DB [skip ci]"
            git push
          else
            echo "No DB changes to commit."
          fi
