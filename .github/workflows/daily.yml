name: CyberSecNews

on:
  schedule:
    # Every 8 hours (cron is in UTC). Frequent runs keep zero-/n-day latency low;
    # the dedup DB ensures nothing is reported twice across overlapping windows.
    - cron: "0 */8 * * *"
  workflow_dispatch:      # allow manual runs from the Actions tab
    inputs:
      since_hours:
        description: "Look-back window in hours (blank = config default). Use 720 for a ~30-day initial backfill."
        required: false
        default: ""

# Needed so the job can commit the updated dedup DB back to the repo.
permissions:
  contents: write

concurrency:
  # Never run two aggregations at once (they'd race on the DB commit).
  group: cybersecnews-daily
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}   # optional; empty if unset
          # Auto-provided by Actions; raises the GitHub Advisories API rate limit
          # from 60/h (unauth) to 5000/h. No secret setup required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed via env (not inline) to avoid shell-injection from the input.
          SINCE_HOURS: ${{ github.event.inputs.since_hours }}
        run: |
          if [ -n "$SINCE_HOURS" ]; then
            python -m cybersecnews --verbose --since "$SINCE_HOURS"
          else
            python -m cybersecnews --verbose
          fi

      - name: Commit updated dedup DB and Atom feed
        run: |
          git config user.name "cybersecnews-bot"
          git config user.email "actions@github.com"
          git add data/seen.db public/atom.xml 2>/dev/null || git add data/seen.db
          if [ -n "$(git status --porcelain data/seen.db public/atom.xml)" ]; then
            git commit -m "chore: update seen DB + Atom feed [skip ci]"
            git push
          else
            echo "No DB or feed changes to commit."
          fi
