# Cheap keyword prefilter run before any LLM call. An article is sent to the LLM
# only if its title/summary contains at least one of these terms (case-insensitive).
# This keeps LLM cost low without hurting recall much. Keep generous.
prefilter:
  vulnerability:
    - vulnerability
    - vulnerabilities
    - cve-
    - zero-day
    - zero day
    - 0-day
    - exploit
    - exploited
    - rce
    - remote code execution
    - privilege escalation
    - authentication bypass
    - auth bypass
    - buffer overflow
    - sql injection
    - patch
    - patched
    - security update
    - flaw
    - backdoor
  red_team:
    - red team
    - red teaming
    - c2
    - command and control
    - command-and-control
    - beacon
    - cobalt strike
    - sliver
    - mythic
    - havoc
    - lateral movement
    - edr evasion
    - edr bypass
    - av evasion
    - defense evasion
    - post-exploitation
    - post exploitation
    - offensive security
    - tradecraft
    - persistence
    - living off the land
    - lolbin

# LLM settings. The API key comes from the ANTHROPIC_API_KEY environment variable.
llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  max_tokens: 1024
  # Whether to use the LLM semantic-match dedup layer (layer 3). Set false to
  # rely only on url/CVE/canonical_key matching (cheaper, slightly less robust).
  semantic_dedup: true

# Dedup: how many days back the semantic layer compares against.
dedup_window_days: 45

# Persisted dedup database (SQLite). Committed back by the daily workflow.
database: data/seen.db

# ntfy.sh reporting. Topic and optional token come from the environment.
ntfy:
  base_url: https://ntfy.sh
  topic_env: NTFY_TOPIC        # env var holding the topic name
  token_env: NTFY_TOKEN        # optional env var holding an access token
  priority: default            # ntfy priority: min, low, default, high, urgent
  # If true, send a short "no new items" heartbeat when nothing new was found.
  # If false, stay silent on empty runs (still logged).
  quiet_heartbeat: false

# Atom feed output. ntfy is a fire-and-forget ping with no read/unread state; an
# Atom feed is a proper reading surface — every feed reader (NetNewsWire, Feedly,
# Miniflux, FreshRSS, Inoreader…) tracks read/unread per item, stars and syncs
# across devices. The feed is rendered from the persisted dedup DB after each run
# and written to `path` for the daily workflow to publish (e.g. GitHub Pages).
# ntfy stays on in parallel as the lightweight "there's something new" ping.
feed:
  enabled: true
  path: public/atom.xml        # written after each real run; published by CI
  max_items: 100               # newest N reported items included in the feed
  title: "CyberSecNews - zero/n-day & red-team"
  # Public URL where the feed will be served. Used for <link rel="self"> and the
  # feed id. Set this to your Pages URL once known, e.g.
  # site_url: https://<user>.github.io/<repo>/atom.xml
  site_url: null
