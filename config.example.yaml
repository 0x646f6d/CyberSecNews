# CyberSecNews configuration.
# Copy to config.yaml and adjust. Secrets are taken from environment variables
# (see the `env:` markers below) and should NOT be committed.

# How far back to look for news each run. Kept slightly larger than the workflow
# cron interval (every 4h) so consecutive runs overlap and nothing slips through;
# the dedup DB prevents the overlap from causing repeat reports.
since_hours: 6

# Per-feed network timeout (seconds) and max concurrent feed fetches. Feeds are
# fetched in parallel, so one slow/hanging source can't stall the whole run.
fetch_timeout: 15
fetch_workers: 10

# Which categories to keep. Anything the LLM classifies outside these is dropped.
# Supported: vulnerability, red_team
categories:
  - vulnerability
  - red_team

# News source connectors. type currently supports "rss".
# Disable a source by setting enabled: false.
#
# bypass_prefilter: true  -> this source's articles skip the keyword prefilter and
# always reach the LLM classifier. Set it on curated, low-volume, high-signal feeds
# (authoritative advisories + red-team research blogs) whose posts often don't
# contain the prefilter keywords verbatim (e.g. "Abusing AD CS ESC13"). The general
# news outlets below keep the prefilter because they are high-volume and off-topic
# heavy.
connectors:
  # --- General security news outlets (prefilter-gated) ---------------------------
  - name: heise-security
    type: rss
    enabled: true
    url: https://www.heise.de/security/rss/news-atom.xml
  - name: golem-security
    type: rss
    enabled: true
    url: https://rss.golem.de/rss.php?feed=SEC-ATOM1.0
  - name: thehackernews
    type: rss
    enabled: true
    url: https://feeds.feedburner.com/TheHackersNews
  - name: bleepingcomputer
    type: rss
    enabled: true
    url: https://www.bleepingcomputer.com/feed/

  # --- Fast authoritative vulnerability / threat-research feeds ------------------
  # These beat the news outlets to zero-/n-days. bypass_prefilter so terse advisory
  # titles are never dropped before the LLM sees them.
  #
  # JSON-API sources (not RSS) — highest-signal, CVE-carrying:
  - name: cisa-kev
    type: cisa_kev
    url: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
    bypass_prefilter: true
  - name: github-advisories
    type: github_advisories
    url: https://api.github.com/advisories
    bypass_prefilter: true
    options:
      severities: [critical]   # add "high" to widen (more volume/noise)
      type: reviewed
      max_pages: 3             # API pages of 100, newest-first; stops at the window
      token_env: GITHUB_TOKEN  # optional; auto-provided in GitHub Actions
  # RSS advisory / research feeds:
  - name: zdi-published
    url: https://www.zerodayinitiative.com/rss/published/
    bypass_prefilter: true
  - name: zdi-upcoming
    url: https://www.zerodayinitiative.com/rss/upcoming/
    bypass_prefilter: true
